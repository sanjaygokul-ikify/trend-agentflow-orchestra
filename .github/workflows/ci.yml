name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint and test
        run: | 
          flake8 .
          python -m unittest discover -v